<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sistem Girişi - Black Barrier</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="varliklar/js/tailwind_ayar.js"></script>
    <link rel="stylesheet" href="varliklar/css/stil.css">
    <script>
        // Zaten geçerli token varsa kontrol paneline yönlendir
        (function() {
            const token = localStorage.getItem('bb_token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp && Math.floor(Date.now() / 1000) < payload.exp) {
                        window.location.href = 'panel.html';
                    }
                } catch(e) { localStorage.removeItem('bb_token'); }
            }
        })();
    </script>
</head>

<body class="bg-slate-50 font-ekran min-h-screen flex items-center justify-center p-4">

    <!-- Arka plan dekorasyon -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-birincil/5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-birincil/5 rounded-full blur-3xl translate-x-1/3 translate-y-1/3"></div>
    </div>

    <!-- Giriş Kartı -->
    <div class="bg-white w-full max-w-[420px] rounded-2xl shadow-buyuk border border-kenarlik relative z-10 overflow-hidden">

        <!-- Üst Logo Alanı -->
        <div class="px-8 pt-8 pb-6 text-center">
            <div class="w-14 h-14 bg-birincil rounded-xl flex items-center justify-center text-white font-bold text-xl mx-auto shadow-orta mb-4">BB</div>
            <h1 class="text-xl font-bold text-metin-birincil">Black Barrier</h1>
            <p class="text-sm text-metin-ucuncul mt-1">Güvenlik duvarı yönetim paneline giriş yapın</p>
        </div>

        <!-- Durum Göstergesi -->
        <div class="mx-8 mb-6 flex items-center gap-2.5 px-4 py-2.5 bg-amber-50 border border-amber-200 rounded-lg">
            <span class="size-2 bg-durum-uyari rounded-full animate-pulse"></span>
            <span class="text-xs font-medium text-amber-700">Oturum açmanız gerekiyor</span>
        </div>

        <!-- Form Alanı -->
        <form id="girisFormu" class="px-8 pb-8 flex flex-col gap-5" onsubmit="return false;">

            <!-- Hata Mesajı Alanı (Gizli) -->
            <div id="hataMesaji" class="hidden px-4 py-3 bg-red-50 border border-red-200 text-red-600 text-sm font-medium rounded-lg"></div>

            <div class="flex flex-col gap-1.5">
                <label for="kullaniciAdi" class="text-sm font-medium text-metin-ikincil flex items-center justify-between">
                    <span>Kullanıcı Adı</span>
                    <span class="material-symbols-outlined text-metin-ucuncul text-lg">person</span>
                </label>
                <input id="kullaniciAdi" name="username"
                    class="w-full px-4 py-3 bg-slate-50 border border-kenarlik rounded-lg focus:border-birincil focus:ring-2 focus:ring-birincil/20 focus:bg-white outline-none text-sm text-metin-birincil transition-all placeholder-metin-ucuncul"
                    placeholder="Kullanıcı adınızı girin" required type="text" autocomplete="username" />
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="sifre" class="text-sm font-medium text-metin-ikincil flex items-center justify-between">
                    <span>Şifre</span>
                    <span class="material-symbols-outlined text-metin-ucuncul text-lg">lock</span>
                </label>
                <div class="relative">
                    <input id="sifre" name="password"
                        class="w-full px-4 py-3 pr-12 bg-slate-50 border border-kenarlik rounded-lg focus:border-birincil focus:ring-2 focus:ring-birincil/20 focus:bg-white outline-none text-sm text-metin-birincil transition-all placeholder-metin-ucuncul"
                        placeholder="••••••••" required type="password" autocomplete="current-password" />
                    <button id="sifreGosterBtn"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-metin-ucuncul hover:text-birincil transition-colors p-1 rounded"
                        type="button" tabindex="-1">
                        <span class="material-symbols-outlined text-lg">visibility_off</span>
                    </button>
                </div>
            </div>

            <button id="girisBtn"
                class="w-full h-12 bg-birincil hover:bg-birincil-koyu text-white font-semibold text-sm rounded-lg transition-all focus:outline-none focus:ring-4 focus:ring-birincil/20 shadow-yumusak active:scale-[0.99] flex items-center justify-center gap-2 mt-2"
                type="submit">
                Giriş Yap
                <span class="material-symbols-outlined text-lg">login</span>
            </button>
        </form>

        <!-- Alt Bilgi -->
        <div class="border-t border-kenarlik px-8 py-3 flex items-center justify-between text-metin-ucuncul text-xs">
            <span>Sürüm 1.0</span>
            <span>Lisans: MIT</span>
        </div>
    </div>

    <!-- Giriş JavaScript -->
    <script>
        document.getElementById('girisFormu').addEventListener('submit', async (e) => {
            e.preventDefault();
            const hataMesaji = document.getElementById('hataMesaji');
            const girisBtn = document.getElementById('girisBtn');
            const kullaniciAdi = document.getElementById('kullaniciAdi').value.trim();
            const sifre = document.getElementById('sifre').value;

            if (!kullaniciAdi || !sifre) {
                hataMesaji.textContent = 'Kullanıcı adı ve şifre zorunludur';
                hataMesaji.classList.remove('hidden');
                return;
            }

            girisBtn.disabled = true;
            girisBtn.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">progress_activity</span> Doğrulanıyor...';
            hataMesaji.classList.add('hidden');

            try {
                const formData = new URLSearchParams();
                formData.append('username', kullaniciAdi);
                formData.append('password', sifre);

                const yanit = await fetch('/api/giris', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (yanit.ok) {
                    const veri = await yanit.json();
                    localStorage.setItem('bb_token', veri.access_token);
                    localStorage.setItem('bb_kullanici', kullaniciAdi);
                    window.location.href = 'panel.html';
                } else {
                    const hata = await yanit.json();
                    hataMesaji.textContent = hata.detail || 'Giriş başarısız — hatalı kimlik bilgileri';
                    hataMesaji.classList.remove('hidden');
                }
            } catch (err) {
                hataMesaji.textContent = 'Sunucu bağlantısı kurulamadı';
                hataMesaji.classList.remove('hidden');
            } finally {
                girisBtn.disabled = false;
                girisBtn.innerHTML = 'Giriş Yap <span class="material-symbols-outlined text-lg">login</span>';
            }
        });

        // Şifre göster/gizle
        document.getElementById('sifreGosterBtn').addEventListener('click', function() {
            const sifreInput = document.getElementById('sifre');
            const ikon = this.querySelector('.material-symbols-outlined');
            if (sifreInput.type === 'password') {
                sifreInput.type = 'text';
                ikon.textContent = 'visibility';
            } else {
                sifreInput.type = 'password';
                ikon.textContent = 'visibility_off';
            }
        });
    </script>

</body>
</html>
